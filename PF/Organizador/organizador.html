<!DOCTYPE html>

<head>
    <title>Gimnasio - Calendario</title>
    <link rel="stylesheet" href="organizador.css">
</head>

<body>

    <div class="container">
        <h1> Calendario de Gimnasio</h1>

        <div class="controls">
            <input type="date" id="date">
            <input type="text" id="activity" placeholder="Actividad (Ej: Pecho, Cardio)">
            <button onclick="addActivity()">Añadir actividad</button>
        </div>

        <div class="calendar" id="calendar"></div>
    </div>

    <script src="organizador.js">
    </script>

</body>

</html>
